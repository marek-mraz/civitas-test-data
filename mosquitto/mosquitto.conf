# Mosquitto configuration for CIVITAS/CORE test data source

# Internal plaintext listener — docker network only, NOT published to the host
# (used by the simulator and the container healthcheck)
listener 1883 0.0.0.0
protocol mqtt

# Public TLS listener — the only port published to the internet.
# Certificate is auto-generated by the cert-gen service; clients connect
# with TLS enabled + server-cert verification off ("allow self-signed").
listener 8883 0.0.0.0
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2

# Authentication: password file is generated from MQTT_USER / MQTT_PASSWORD
# by the container entrypoint (see docker-compose.yml)
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
