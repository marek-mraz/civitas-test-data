# Mosquitto configuration for CIVITAS/CORE test data source

# Security is configured per-listener (below), not globally
per_listener_settings true

# Plaintext listener — used by the internal simulator/healthcheck and by the
# external NiFi adapter (which cannot do TLS MQTT). Published to the host, but
# should be firewalled to the AKS egress IP. Same password file as TLS.
listener 1883 0.0.0.0
protocol mqtt
allow_anonymous false
password_file /mosquitto/config/passwd

# Public TLS listener — the only port published to the internet.
# Certificate is auto-generated by the cert-gen service; clients connect
# with TLS enabled + server-cert verification off ("allow self-signed").
listener 8883 0.0.0.0
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2

# Authentication on the public listener: password file is generated from
# MQTT_USER / MQTT_PASSWORD by the container entrypoint (see docker-compose.yml)
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
