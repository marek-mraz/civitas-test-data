# Client authentication — mounted via `-c hba_file=` (see docker-compose.yml).
# Remote connections must use TLS + SCRAM; plaintext remotes are rejected.
# Local socket stays open for the entrypoint and the container healthcheck.

# container-internal
local     all all                trust
host      all all 127.0.0.1/32   scram-sha-256
host      all all ::1/128        scram-sha-256
# everything else: TLS required, plaintext rejected
hostssl   all all 0.0.0.0/0      scram-sha-256
hostssl   all all ::/0           scram-sha-256
hostnossl all all 0.0.0.0/0      reject
hostnossl all all ::/0           reject
